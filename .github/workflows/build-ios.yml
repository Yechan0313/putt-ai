name: Build iOS .ipa

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: iOS Build (AltStore용)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --non-interactive

      - name: Show Xcode schemes
        run: xcodebuild -workspace ios/putt-ai.xcworkspace -list

      - name: Build Archive (unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/putt-ai.xcworkspace \
            -scheme putt-ai \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/putt-ai.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .ipa
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/putt-ai.xcarchive" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r ../putt-ai.ipa Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: putt-ai-ipa
          path: ${{ runner.temp }}/putt-ai.ipa
          retention-days: 7
