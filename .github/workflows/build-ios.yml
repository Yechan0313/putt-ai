name: Build iOS .ipa

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  build:
    name: iOS Build (AltStore용)
    runs-on: macos-15

    steps:
      # ── 1. 체크아웃 ───────────────────────────────────────────
      - uses: actions/checkout@v5

      # ── 2. Node.js 22 ────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. 의존성 설치 ────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. iOS 네이티브 프로젝트 생성 ─────────────────────────
      #   --clean : ios/ 디렉터리 초기화 후 재생성
      #   lidar-sensor는 package.json expo.autolinking.exclude 로 제외
      #   (자체 podspec이 CI에서 pod install 실패시키는 문제 방지)
      - name: Expo Prebuild
        env:
          EXPO_NO_GIT_STATUS: 1
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── 5. pod install (prebuild 후 명시적으로 실행) ──────────
      #   prebuild가 CI 환경에서 pod install을 건너뛰는 경우 대비
      - name: CocoaPods install
        run: |
          cd ios
          pod install --no-repo-update 2>&1

      # ── 6. ios/ 구조 확인 (디버깅) ───────────────────────────
      - name: Show ios/ contents after pod install
        run: |
          echo "=== ios/ top-level ==="
          ls -la ios/
          echo ""
          echo "=== Xcode workspace list ==="
          find ios -maxdepth 1 \( -name "*.xcworkspace" -o -name "*.xcodeproj" \)

      # ── 7. 워크스페이스·스킴 동적 감지 ──────────────────────
      #   xcworkspace 없으면 xcodeproj fallback
      - name: Detect Xcode workspace and scheme
        id: xcode
        run: |
          WS=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)

          if [ -z "$WS" ]; then
            echo "WARNING: .xcworkspace not found, falling back to .xcodeproj"
            WS=$(find ios -maxdepth 1 -name "*.xcodeproj" | head -1)
            echo "use_project=true" >> $GITHUB_OUTPUT
          else
            echo "use_project=false" >> $GITHUB_OUTPUT
          fi

          if [ -z "$WS" ]; then
            echo "ERROR: No Xcode workspace or project found in ios/"
            ls ios/
            exit 1
          fi

          # 스킴 이름: -workspace or -project 모두 동작
          SCHEME=$(xcodebuild -workspace "$WS" -list 2>/dev/null \
            | awk '/Schemes:/{f=1;next} f && /[[:graph:]]/{print $1; exit}')

          if [ -z "$SCHEME" ]; then
            # xcodeproj fallback으로 시도
            SCHEME=$(xcodebuild -project "$(find ios -maxdepth 1 -name "*.xcodeproj" | head -1)" -list 2>/dev/null \
              | awk '/Schemes:/{f=1;next} f && /[[:graph:]]/{print $1; exit}')
          fi

          echo "workspace=$WS"  >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "→ Workspace/Project : $WS"
          echo "→ Scheme            : $SCHEME"

      # ── 8. xcodebuild — 서명 없이 arm64 실기기 빌드 ──────────
      - name: xcodebuild (unsigned, arm64 device)
        run: |
          WS="${{ steps.xcode.outputs.workspace }}"
          SCHEME="${{ steps.xcode.outputs.scheme }}"
          USE_PROJECT="${{ steps.xcode.outputs.use_project }}"

          if [ "$USE_PROJECT" = "true" ]; then
            WS_FLAG="-project"
          else
            WS_FLAG="-workspace"
          fi

          # NODE_BINARY: expo-constants Pod의 빌드 스크립트가
          # app.config 생성을 위해 node를 직접 실행함.
          # xcodebuild 프로세스는 PATH를 제한적으로 상속하므로
          # 명시적으로 node 경로를 전달해야 exit 65를 방지할 수 있음.
          NODE_BIN=$(which node)

          xcodebuild \
            $WS_FLAG "$WS" \
            -scheme   "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            NODE_BINARY="$NODE_BIN" \
            build

      # ── 9. .app → .ipa 패키징 ────────────────────────────────
      - name: Package .ipa
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData/Build/Products" \
            -maxdepth 2 -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "ERROR: .app not found. DerivedData contents:"
            find "$RUNNER_TEMP/DerivedData" -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "→ Found .app: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r putt-ai.ipa Payload
          ls -lh putt-ai.ipa

      # ── 10. .ipa 업로드 ───────────────────────────────────────
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: putt-ai-ipa
          path: ${{ runner.temp }}/putt-ai.ipa
          retention-days: 7
