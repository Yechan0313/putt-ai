name: Build iOS .ipa (Pure Swift)

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  build:
    name: Swift iOS Build (AltStore용)
    runs-on: macos-15

    env:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
      DEVELOPMENT_TEAM: ""
      PROVISIONING_PROFILE: ""
      PROVISIONING_PROFILE_SPECIFIER: ""

    steps:
      # ── 1. 체크아웃 ──────────────────────────────────────────────
      - uses: actions/checkout@v5

      # ── 2. xcodegen 설치 ─────────────────────────────────────────
      - name: Install xcodegen
        run: brew install xcodegen

      # ── 3. Xcode 프로젝트 생성 ───────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── 4. 빌드 확인용 구조 출력 ─────────────────────────────────
      - name: Show project structure
        run: |
          ls -la
          xcodebuild -project PuttAI.xcodeproj -list

      # ── 5. xcodebuild (서명 없음, arm64) ─────────────────────────
      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project PuttAI.xcodeproj \
            -scheme PuttAI \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            build

      # ── 6. .app → .ipa 패키징 ────────────────────────────────────
      - name: Package .ipa
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData/Build/Products" \
            -maxdepth 2 -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "ERROR: .app not found"
            find "$RUNNER_TEMP/DerivedData" -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "→ .app: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r putt-ai.ipa Payload
          ls -lh putt-ai.ipa

      # ── 7. Artifact 업로드 ───────────────────────────────────────
      - uses: actions/upload-artifact@v5
        with:
          name: putt-ai-ipa
          path: ${{ runner.temp }}/putt-ai.ipa
          retention-days: 7
